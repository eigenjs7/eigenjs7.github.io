{%- assign p = include.project -%}
{%- assign href = p.external_url | default: p.url -%}
<a href="{{ href }}" class="card" target="_blank" rel="noopener">
  <span class="card-glyph" aria-hidden="true">
    {%- if p.image -%}
      <img src="{{ p.image | relative_url }}" alt="">
    {%- else -%}
      {{ p.glyph | default: "·" }}
    {%- endif -%}
  </span>
  <div class="card-body">
    <h2 class="card-title">{{ p.title | escape }}</h2>
    {%- if p.metadata -%}
      <p class="card-metadata">{{ p.metadata }}</p>
    {%- endif -%}
    {%- if p.summary -%}
      <p class="card-summary">{{ p.summary }}</p>
    {%- endif -%}
  </div>
  <span class="card-arrow" aria-hidden="true">↗&#xFE0E;</span>
</a>
