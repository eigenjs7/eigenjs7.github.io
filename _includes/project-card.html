{%- assign p = include.project -%}
{%- assign href = p.external_url | default: p.url -%}
<a href="{{ href }}" class="card" target="_blank" rel="noopener">
  <div class="card-image" aria-hidden="true">
    {%- if p.image -%}
      <img src="{{ p.image | relative_url }}" alt="">
    {%- else -%}
      <span class="card-glyph">{{ p.glyph | default: "·" }}</span>
    {%- endif -%}
  </div>
  <div class="card-body">
    <h3 class="card-title">{{ p.title | escape }}</h3>
    {%- if p.metadata -%}
      <p class="card-metadata">{{ p.metadata }}</p>
    {%- endif -%}
    {%- if p.summary -%}
      <p class="card-summary">{{ p.summary }}</p>
    {%- endif -%}
    <span class="card-arrow" aria-hidden="true">↗</span>
  </div>
</a>
