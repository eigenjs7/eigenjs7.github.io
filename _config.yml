# Site settings
title: Junseo Lee's Research Blog
email: junseo.lee.1@stonybrook.edu
description: "Exploring mathematics and computation"
baseurl: ""                         # subpath, e.g. /blog
url: "https://www.eigenjs.com"      # base hostname & protocol
github_username: eigenjs7
linkedin_username: pauljunseo
author: Junseo Lee

# Social / OG — image is used by jekyll-seo-tag for og:image and twitter:image.
# Profile photo fills in until a dedicated 1200x630 share image is made.
image: /assets/images/profile.jpg
twitter:
  card: summary

# Build
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Markdown / math
markdown: kramdown
kramdown:
  math_engine: mathjax
  math_engine_opts: {}
  input: GFM
  syntax_highlighter: rouge

# Collections
collections:
  services:
    output: true
    permalink: /services/:path/
  projects:
    output: false

# Files / folders Jekyll should ignore.
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - node_modules/
  - AUDIT.md
  - DESIGN_SYSTEM.md
  - README.md
  - USER_GUIDE.md
  - _templates/
  - .obsidian/
  - .DS_Store

# Default front matter so every post gets sane defaults.
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Junseo Lee"
